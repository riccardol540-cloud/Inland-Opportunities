<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>INLAND · Opportunities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Password gate -->
  <div id="gate" class="gate hidden">
    <form id="gate-form" class="gate-card">
      <div class="gate-mark">INLAND</div>
      <div class="gate-sub">Opportunities</div>
      <input id="gate-pw" type="password" placeholder="Password" autocomplete="current-password" />
      <button type="submit">Enter</button>
      <div id="gate-error" class="gate-error"></div>
    </form>
  </div>

  <!-- Dashboard -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">INLAND</span>
        <span class="brand-sub">Opportunities</span>
      </div>
      <div class="topbar-actions">
        <span id="updated" class="updated"></span>
        <button id="refresh" class="ghost">Refresh</button>
        <button id="add" class="ghost">+ Add</button>
        <button id="logout" class="ghost">Sign out</button>
      </div>
    </header>

    <div class="legend">
      <span>Fit:</span>
      <span class="chip f5">5 bullseye</span>
      <span class="chip f4">4 strong</span>
      <span class="chip f3">3 possible</span>
      <span class="chip f2">2 weak</span>
      <span class="chip f1">1 marginal</span>
    </div>

    <main class="board">
      <section class="column" data-status="new">
        <h2>Inbox <span class="count" id="count-new">0</span></h2>
        <div class="cards" id="col-new"></div>
      </section>
      <section class="column" data-status="pursuing">
        <h2>Pursuing <span class="count" id="count-pursuing">0</span></h2>
        <div class="cards" id="col-pursuing"></div>
      </section>
      <section class="column" data-status="archived">
        <h2>Archived <span class="count" id="count-archived">0</span></h2>
        <div class="cards" id="col-archived"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
